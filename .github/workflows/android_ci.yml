name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Sign APKs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: "Monitoring, Dashboard, and Control/WaterMonitor"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
        working-directory: "Monitoring, Dashboard, and Control/WaterMonitor/app"

      - name: Build signed Debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: "Monitoring, Dashboard, and Control/WaterMonitor"

      - name: Build signed Release APK
        run: ./gradlew assembleRelease --stacktrace
        working-directory: "Monitoring, Dashboard, and Control/WaterMonitor"
        env:
          SIGNING_STORE_FILE: keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload signed Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WaterMonitor-debug-apk
          path: "Monitoring, Dashboard, and Control/WaterMonitor/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 14
          if-no-files-found: error

      - name: Upload signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WaterMonitor-release-apk
          path: "Monitoring, Dashboard, and Control/WaterMonitor/app/build/outputs/apk/release/app-release.apk"
          retention-days: 14
          if-no-files-found: error

name: Generate Signing Secrets

# Run this workflow ONCE manually to generate a signing keystore and populate
# all four GitHub secrets required by the Android CI signing workflow:
#
#   KEYSTORE_BASE64      – base64-encoded JKS keystore
#   KEY_STORE_PASSWORD   – keystore password
#   KEY_ALIAS            – key alias inside the keystore
#   KEY_PASSWORD         – private-key password
#
# After this workflow completes successfully you can delete it if you like;
# the secrets it created persist in your repository settings.

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias (name for the signing key)'
        required: false
        default: 'watermonitor'
      validity_years:
        description: 'Certificate validity in years'
        required: false
        default: '25'
      distinguished_name:
        description: 'Distinguished Name (DN) for the certificate'
        required: false
        default: 'CN=WaterMonitor,O=WaterMonitor,C=US'

jobs:
  generate-secrets:
    name: Generate Keystore and Set Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      secrets: write

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate random passwords
        id: passwords
        run: |
          # Generate two independent 32-character random passwords (alphanumeric)
          STORE_PASS=$(python3 -c "
          import secrets, string
          chars = string.ascii_letters + string.digits
          print(''.join(secrets.choice(chars) for _ in range(32)))
          ")
          KEY_PASS=$(python3 -c "
          import secrets, string
          chars = string.ascii_letters + string.digits
          print(''.join(secrets.choice(chars) for _ in range(32)))
          ")
          # Write to GITHUB_OUTPUT using delimiter to avoid injection
          {
            echo "store_pass<<EOF"
            echo "$STORE_PASS"
            echo "EOF"
            echo "key_pass<<EOF"
            echo "$KEY_PASS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate signing keystore
        run: |
          VALIDITY_DAYS=$(python3 -c "import math; y=${{ github.event.inputs.validity_years }}; print(math.ceil(y * 365.25))")
          keytool -genkey -v \
            -keystore watermonitor.jks \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity "$VALIDITY_DAYS" \
            -storepass "${{ steps.passwords.outputs.store_pass }}" \
            -keypass "${{ steps.passwords.outputs.key_pass }}" \
            -dname "${{ github.event.inputs.distinguished_name }}"

      - name: Set GitHub secrets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"

          # KEYSTORE_BASE64
          base64 -w 0 watermonitor.jks | \
            gh secret set KEYSTORE_BASE64 --repo "$REPO"

          # KEY_STORE_PASSWORD
          printf '%s' "${{ steps.passwords.outputs.store_pass }}" | \
            gh secret set KEY_STORE_PASSWORD --repo "$REPO"

          # KEY_ALIAS
          printf '%s' "${{ github.event.inputs.key_alias }}" | \
            gh secret set KEY_ALIAS --repo "$REPO"

          # KEY_PASSWORD
          printf '%s' "${{ steps.passwords.outputs.key_pass }}" | \
            gh secret set KEY_PASSWORD --repo "$REPO"

      - name: Securely delete keystore from runner
        if: always()
        run: shred -uz watermonitor.jks 2>/dev/null || rm -f watermonitor.jks

      - name: Summary
        run: |
          echo "## ✅ Signing secrets created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The following secrets have been set in **${{ github.repository }}**:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret | Description |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`KEYSTORE_BASE64\` | Base64-encoded JKS keystore |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`KEY_STORE_PASSWORD\` | Keystore password (32-char random) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`KEY_ALIAS\` | Key alias: \`${{ github.event.inputs.key_alias }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`KEY_PASSWORD\` | Key password (32-char random) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The Android CI workflow will now sign both the debug and release APKs automatically." >> "$GITHUB_STEP_SUMMARY"
